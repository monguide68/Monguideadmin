<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon guide administratif local — CSC Le Boat</title>
<style>
  :root {
    --bleu: #003189;
    --bleu-clair: #1d4ed8;
    --rouge: #E1000F;
    --or: #F5A623;
    --fond: #FAFAF7;
    --fond-carte: #FFFFFF;
    --texte: #1A2238;
    --texte-secondaire: #5B6478;
    --bordure: #E6E2D8;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: var(--fond);
    color: var(--texte);
    min-height: 100vh;
  }

  body[dir="rtl"] { direction: rtl; }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--fond);
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.04);
  }

  /* ---------- HEADER ---------- */
  .topbar {
    background: var(--bleu);
    color: white;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    transition: background 0.3s ease;
  }
  .topbar.screen-organisms  { background: #003189; }
  .topbar.screen-organism-detail { background: #003189; }
  .topbar.screen-situation  { background: #1B6B3A; }
  .topbar.screen-situation-detail { background: #1B6B3A; }
  .topbar.screen-partners   { background: #5B2D8E; }
  .topbar.screen-partners-detail { background: #5B2D8E; }
  .topbar.screen-info       { background: #1A4A6B; }
  .topbar.screen-cyberboat  { background: #A0001A; }
  .topbar .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.2px;
  }
  .brand-mark {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--or), var(--rouge));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .back-btn {
    background: rgba(255,255,255,0.14);
    border: none;
    color: white;
    width: 34px; height: 34px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .lang-pill {
    background: #F5A623;
    border: none;
    color: #003189;
    padding: 9px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
  }
  .lang-pill::before {
    content: "🌐";
    font-size: 16px;
  }

  .vote-block {
    margin-top: 24px;
    padding: 16px;
    background: #F8F7FF;
    border-radius: 16px;
    border: 1px solid #E0D8FF;
    text-align: center;
  }
  .vote-block p {
    font-size: 13px;
    color: var(--texte-secondaire);
    margin-bottom: 12px;
    font-weight: 600;
  }
  .vote-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .vote-btn {
    flex: 1;
    max-width: 140px;
    padding: 12px;
    border: 2px solid transparent;
    border-radius: 12px;
    font-size: 22px;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.15s;
  }
  .vote-btn.yes { background: #E8F5E9; border-color: #4CAF50; color: #2E7D32; }
  .vote-btn.no  { background: #FFEBEE; border-color: #F44336; color: #C62828; }
  .vote-btn.voted { opacity: 0.6; cursor: default; }
  .vote-thanks {
    font-size: 14px;
    font-weight: 700;
    color: #2E7D32;
    margin-top: 8px;
  }
    height: 4px;
    background: linear-gradient(90deg, var(--bleu) 0%, var(--bleu) 60%, var(--or) 80%, var(--rouge) 100%);
  }

  main { padding: 20px; padding-bottom: 90px; }

  /* ---------- LANGUAGE SCREEN ---------- */
  .lang-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 28px 20px 32px;
    background: linear-gradient(170deg, #003189 0%, #0050c8 55%, #0072f0 100%);
  }
  .lang-screen .logo-big {
    width: 100%;
    max-width: 220px;
    height: 150px;
    border-radius: 20px;
    background: white;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    overflow: hidden;
  }
  .lang-screen h1 {
    text-align: center;
    font-size: 20px;
    color: white;
    margin-bottom: 4px;
    font-weight: 800;
    letter-spacing: 0.3px;
  }
  .lang-screen .app-title {
    text-align: center;
    font-size: 15px;
    color: rgba(255,255,255,0.92);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .lang-screen .app-subtitle {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 28px;
  }
  .lang-screen p.sub {
    text-align: center;
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    margin-bottom: 20px;
    font-weight: 500;
  }
  .lang-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .lang-card {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    padding: 20px 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
    backdrop-filter: blur(8px);
  }
  .lang-card:hover, .lang-card:active {
    background: rgba(255,255,255,0.28);
    border-color: rgba(255,255,255,0.7);
    transform: translateY(-2px);
  }
  .lang-card .flag { font-size: 36px; display: block; margin-bottom: 10px; }
  .lang-card .name-native { font-weight: 700; font-size: 16px; color: white; }
  .lang-card .name-fr { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 3px; }

  /* ---------- HOME ---------- */
  .site-card {
    background: linear-gradient(135deg, var(--bleu) 0%, #052063 100%);
    color: white;
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .site-card::after {
    content: "";
    position: absolute;
    right: -30px; top: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(245,166,35,0.25), transparent 70%);
  }
  .site-card .tag {
    display: inline-block;
    background: rgba(255,255,255,0.16);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.4px;
    margin-bottom: 10px;
  }
  .site-card h2 { font-size: 19px; margin-bottom: 4px; }
  .site-card .addr { font-size: 13px; opacity: 0.85; margin-bottom: 14px; }
  .site-card .status-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ADE80; }
  .dot.closed { background: #F87171; }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--texte-secondaire);
    margin: 22px 0 10px;
  }
  .section-title:first-of-type { margin-top: 0; }

  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .menu-card {
    background: var(--fond-carte);
    border: 1px solid var(--bordure);
    border-radius: var(--radius);
    padding: 18px 14px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .menu-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,49,137,0.08); }
  .menu-card .icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin-bottom: 10px;
  }
  .menu-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
  .menu-card p { font-size: 12px; color: var(--texte-secondaire); line-height: 1.4; }

  .icon.blue { background: #E8EEFB; color: var(--bleu); }
  .icon.gold { background: #FDF0DA; color: #B5780E; }
  .icon.red { background: #FCE4E4; color: var(--rouge); }
  .icon.green { background: #DEF7E7; color: #1B8A4B; }

  /* ---------- LIST ROWS ---------- */
  .row-card {
    background: var(--fond-carte);
    border: 1px solid var(--bordure);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s ease;
  }
  .row-card:hover { border-color: var(--bleu); }
  .row-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    font-weight: 700;
    background: #E8EEFB;
    color: var(--bleu);
  }
  .row-text h4 { font-size: 14.5px; font-weight: 700; margin-bottom: 2px; }
  .row-text p { font-size: 12px; color: var(--texte-secondaire); }
  .row-chevron { margin-inline-start: auto; color: var(--bordure); font-size: 18px; }
  [dir="rtl"] .row-chevron { transform: scaleX(-1); }

  /* ---------- DETAIL / CHECKLIST ---------- */
  .detail-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 18px;
  }
  .detail-header .row-icon { width: 50px; height: 50px; font-size: 22px; }
  .detail-header h2 { font-size: 18px; }
  .detail-header p { font-size: 12.5px; color: var(--texte-secondaire); }

  .info-block {
    background: var(--fond-carte);
    border: 1px solid var(--bordure);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }
  .info-block h4 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--texte-secondaire);
    margin-bottom: 10px;
  }

  .doc-item {
    padding: 9px 0;
    border-bottom: 1px solid #F0EDE3;
    font-size: 14px;
    line-height: 1.45;
    color: var(--texte);
  }
  .doc-item:last-child { border-bottom: none; }

  .conditional-block {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px dashed var(--bordure);
  }
  .conditional-block h4 {
    font-size: 12px;
    color: #B5780E;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .progress-wrap {
    margin-bottom: 16px;
  }
  .progress-bar-bg {
    height: 8px;
    background: #EDEAE0;
    border-radius: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--bleu), var(--bleu-clair));
    border-radius: 6px;
    transition: width 0.25s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--texte-secondaire);
    margin-top: 6px;
  }

  .hours-table { width: 100%; font-size: 13.5px; }
  .hours-table tr { border-bottom: 1px solid #F0EDE3; }
  .hours-table tr:last-child { border-bottom: none; }
  .hours-table td { padding: 8px 0; }
  .hours-table td:first-child { font-weight: 600; }
  .hours-table td:last-child { text-align: right; color: var(--texte-secondaire); }
  .hours-table tr.today td { color: var(--bleu); font-weight: 700; }

  .badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    background: #E8EEFB;
    color: var(--bleu);
  }
  .badge.gold { background: #FDF0DA; color: #B5780E; }
  .badge.green { background: #DEF7E7; color: #1B8A4B; }

  .partner-tag {
    display: inline-block;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    background: #E8EEFB;
    color: var(--bleu);
    font-weight: 600;
    margin: 3px;
    cursor: pointer;
  }

  .note-box {
    background: #FFF8EA;
    border: 1px solid #F3DDA6;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12.5px;
    color: #7A5610;
    margin-top: 14px;
    line-height: 1.5;
  }

  /* ---------- BOTTOM NAV ---------- */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--fond-carte);
    border-top: 1px solid var(--bordure);
    display: flex;
    justify-content: space-around;
    padding: 10px 8px 14px;
    z-index: 50;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--texte-secondaire);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 10px;
    transition: color 0.15s ease;
  }
  .nav-item.active { color: var(--bleu); }
  .nav-item .nav-icon { font-size: 19px; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--texte-secondaire);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; }

  ::-webkit-scrollbar { width: 0; }

/* ===================== STATE ===================== */

let state = {
  screen: "lang",
  lang: null,
  currentOrganism: null,
  currentPartner: null,
  currentSituation: null,
};

function t(key) {
  return (i18n[state.lang] && i18n[state.lang][key]) || i18n.fr[key];
}

function setScreen(screen, payload) {
  state.screen = screen;
  if (payload) Object.assign(state, payload);
  render();
  window.scrollTo(0, 0);
}

function parseTimeRanges(hoursStr) {
  // "9h00 – 12h00 / 13h30 – 17h00" -> [[9,0,12,0],[13,30,17,0]]
  return hoursStr.split("/").map(range => {
    const [start, end] = range.trim().split("–").map(s => s.trim());
    const parse = (t) => {
      const m = t.match(/(\d+)h(\d*)/);
      return m ? parseInt(m[1]) * 60 + (parseInt(m[2]) || 0) : 0;
    };
    return [parse(start), parse(end)];
  });
}

function isOpenNow() {
  const now = new Date();
  const day = now.getDay();
  const entry = siteInfo.hours.find(h => h.day === day);
  if (!entry) return false;
  const nowMinutes = now.getHours() * 60 + now.getMinutes();
  const ranges = parseTimeRanges(entry.hours);
  return ranges.some(([start, end]) => nowMinutes >= start && nowMinutes < end);
}

/* ===================== RENDER ===================== */

function render() {
  const app = document.getElementById("app");
  document.body.dir = state.lang === "ar" ? "rtl" : "ltr";

  if (state.screen === "lang") {
    app.innerHTML = renderLangScreen();
    attachLangEvents();
    return;
  }

  app.innerHTML = `
    ${renderTopbar()}
    <div class="accent-bar"></div>
    <main>${renderScreenContent()}</main>
    ${renderBottomNav()}
  `;
  attachGlobalEvents();
}

function renderBottomNav() {
  const items = [
    { id: "home", icon: "🏠", label: t("home") },
    { id: "organisms", icon: "📋", label: t("organisms") },
    { id: "situation", icon: "🙋", label: t("maSituation") },
    { id: "partners", icon: "🤝", label: t("partners") },
    { id: "info", icon: "ℹ️", label: t("info") },
  ];
  return `
    <div class="bottom-nav">
      ${items.map(i => `
        <div class="nav-item ${state.screen.startsWith(i.id) ? "active" : ""}" data-nav="${i.id}">
          <span class="nav-icon">${i.icon}</span>
          <span style="font-size:9px;">${i.label}</span>
        </div>
      `).join("")}
    </div>
  `;
}

function renderScreenContent() {
  switch (state.screen) {
    case "home": return renderHome();
    case "organisms": return renderOrganismsList();
    case "organism-detail": return renderOrganismDetail();
    case "partners": return renderPartners();
    case "partners-detail": return renderPartnerDetail();
    case "info": return renderInfo();
    case "cyberboat": return renderCyberboat();
    case "situation": return renderSituationList();
    case "situation-detail": return renderSituationDetail();
    default: return renderHome();
  }
}

function renderOrganismsList() {
  return `
    <div class="section-title">${t("allOrganisms")}</div>
    ${organisms.map(o => `
      <div class="row-card" data-organism="${o.id}">
        <div class="row-icon">${o.icon}</div>
        <div class="row-text">
          <h4>${o.name[state.lang] || o.name.fr}</h4>
          ${o.rdv ? `<p>${t("rdvOnly")}</p>` : ""}
        </div>
        <div class="row-chevron">›</div>
      </div>
    `).join("")}
  `;
}

function getVotes() {
  try { return JSON.parse(localStorage.getItem('votes') || '{}'); } catch(e) { return {}; }
}

function saveVote(id, value) {
  const votes = getVotes();
  if (!votes[id]) votes[id] = { yes: 0, no: 0 };
  votes[id][value]++;
  votes[id].voted = true;
  localStorage.setItem('votes', JSON.stringify(votes));
  render();
}

function renderVoteBlock(id) {
  const votes = getVotes();
  const v = votes[id];
  if (v && v.voted) {
    return `<div class="vote-block"><p class="vote-thanks">${t("voteThanks")}</p></div>`;
  }
  return `
    <div class="vote-block">
      <p>${t("useful")}</p>
      <div class="vote-buttons">
        <button class="vote-btn yes" onclick="saveVote('${id}','yes')">${t("voteYes")}</button>
        <button class="vote-btn no" onclick="saveVote('${id}','no')">${t("voteNo")}</button>
      </div>
    </div>
  `;
}

function renderOrganismDetail() {
  const o = organisms.find(x => x.id === state.currentOrganism);
  if (!o) return `<div class="empty-state"><div class="icon">🔍</div><p>${t("noPartnerSelected")}</p></div>`;

  function docItem(doc) {
    return `<div class="doc-item">• ${doc[state.lang] || doc.fr}</div>`;
  }

  const docsHtml = (o.docs || []).map(d => docItem(d)).join("");
  const condHtml = (o.conditionalDocs || []).map(d => docItem(d)).join("");
  const specHtml = (o.specificDocs || []).map(d => docItem(d)).join("");

  let subDemarchesHtml = "";
  if (o.subDemarches) {
    subDemarchesHtml = o.subDemarches.map(sub => {
      const badgeText = sub.badge ? (sub.badge[state.lang] || sub.badge.fr) : null;
      const subNote = sub.note ? (sub.note[state.lang] || sub.note.fr) : null;
      const subDocsHtml = sub.docs.map(d => docItem(d)).join("");
      const subTipHtml = sub.agentTipItems ? `
        <div class="note-box" style="margin-top:10px; background:#EEF4FF; border-color:#B8CFF5; color:#003189;">
          ⭐ <strong>${state.lang === 'ar' ? 'نصيحة' : state.lang === 'de' ? 'Tipp' : state.lang === 'en' ? 'Tip' : 'Astuce'}</strong>
          <ul style="margin-top:6px; padding-inline-start:16px; line-height:1.6;">
            ${sub.agentTipItems.map(item => `<li>${item[state.lang] || item.fr}</li>`).join("")}
          </ul>
        </div>
      ` : "";
      return `
        <div class="info-block">
          <h4>${sub.title[state.lang] || sub.title.fr}</h4>
          ${badgeText ? `<div style="margin-bottom:10px;"><span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:#F0EDE3;color:var(--texte-secondaire);">${badgeText}</span></div>` : ""}
          ${subDocsHtml}
          ${subNote ? `<div class="note-box" style="margin-top:10px;">🔗 ${subNote}</div>` : ""}
          ${subTipHtml}
        </div>
      `;
    }).join("");
  }

  let systematicHtml = "";
  if (o.systematicDocs) {
    const sysDocsHtml = o.systematicDocs.map(d => docItem(d)).join("");
    systematicHtml = `
      <div class="info-block" style="border-color:var(--bleu);">
        <h4 style="color:var(--bleu);">📋 ${state.lang === 'ar' ? 'وثائق مطلوبة دائمًا' : state.lang === 'de' ? 'Immer erforderliche Unterlagen' : state.lang === 'en' ? 'Documents always required' : 'Documents à demander systématiquement'}</h4>
        ${sysDocsHtml}
      </div>
    `;
  }

  let agentTipHtml = "";
  if (o.agentTip) {
    const tipTitle = o.agentTip.title[state.lang] || o.agentTip.title.fr;
    const tipItems = o.agentTip.items.map(item => `<li style="margin-bottom:6px;">${item[state.lang] || item.fr}</li>`).join("");
    agentTipHtml = `
      <div class="note-box" style="background:#EEF4FF; border-color:#B8CFF5; color:#003189;">
        ⭐ <strong>${tipTitle}</strong>
        <ul style="margin-top:8px; padding-inline-start:18px; line-height:1.6;">${tipItems}</ul>
      </div>
    `;
  }

  const hasMainDocs = docsHtml || condHtml;
  const isEmpty = !hasMainDocs && !subDemarchesHtml && !specHtml;

  return `
    <div class="detail-header">
      <div class="row-icon" style="width:50px;height:50px;font-size:22px;">${o.icon}</div>
      <div>
        <h2>${o.name[state.lang] || o.name.fr}</h2>
        ${o.rdv ? `<p>${t("rdvOnly")}</p>` : ""}
      </div>
    </div>

    ${hasMainDocs ? `
      <div class="info-block">
        <h4>${t("documentsToBring")}</h4>
        ${docsHtml}
        ${condHtml ? `
          <div class="conditional-block">
            <h4>${t("conditional")}</h4>
            ${condHtml}
          </div>
        ` : ""}
      </div>
    ` : ""}

    ${subDemarchesHtml}
    ${systematicHtml}
    ${agentTipHtml}

    ${specHtml ? `
      <div class="info-block">
        <h4>${(o.specificTitle && (o.specificTitle[state.lang] || o.specificTitle.fr)) || t("specificFile")}</h4>
        ${specHtml}
      </div>
    ` : ""}

    ${o.note && isEmpty ? `<div class="note-box">💡 ${o.note[state.lang] || o.note.fr}</div>` : ""}
    ${o.note && !isEmpty ? `<div class="note-box">💡 ${o.note[state.lang] || o.note.fr}</div>` : ""}

    ${isEmpty && !o.note ? `<div class="empty-state"><div class="icon">🚧</div><p>${state.lang === 'ar' ? 'سيتم استكمال القائمة قريبًا' : state.lang === 'de' ? 'Liste wird bald ergänzt' : state.lang === 'en' ? 'List to be completed soon' : 'Liste à compléter prochainement'}</p></div>` : ""}

    ${renderVoteBlock('doc-' + o.id)}
  `;
}

function renderPartners() {
  return `
    <div class="section-title">${t("partnersTitle")}</div>
    ${organisms.map(o => `
      <div class="row-card" data-partner="${o.id}">
        <div class="row-icon">${o.icon}</div>
        <div class="row-text">
          <h4>${o.name[state.lang] || o.name.fr}</h4>
          ${o.rdv ? `<p>${t("rdvOnly")}</p>` : ""}
        </div>
        <div class="row-chevron">›</div>
      </div>
    `).join("")}
  `;
}

function renderPartnerDetail() {
  const o = organisms.find(x => x.id === state.currentPartner);
  if (!o) return `<div class="empty-state"><div class="icon">🔍</div><p>${t("noPartnerSelected")}</p></div>`;

  return `
    <div class="detail-header">
      <div class="row-icon" style="width:50px;height:50px;font-size:22px;">${o.icon}</div>
      <div>
        <h2>${o.name[state.lang] || o.name.fr}</h2>
      </div>
    </div>

    <div class="info-block">
      <h4>${t("accessMode")}</h4>
      <table class="hours-table">
        ${siteInfo.hours.map(h => `
          <tr>
            <td>${t("days")[h.day]}</td>
            <td>
              ${h.hours}<br>
              <span style="font-size:11px; font-weight:700; color:${h.mode === 'libre' ? '#1B8A4B' : '#B5780E'};">
                ${h.mode === 'libre' ? '★ ' + t("modeFree") : t("modeRdv")}
              </span>
            </td>
          </tr>
        `).join("")}
      </table>
    </div>

    ${o.demarches ? `
      <div class="info-block">
        <h4>${t("demarchesTitle")}</h4>
        ${o.demarches.map(d => `<div class="doc-item">• ${typeof d === 'object' ? (d[state.lang] || d.fr) : d}</div>`).join("")}
      </div>
    ` : ""}

    ${o.note ? `<div class="note-box">💡 ${o.note[state.lang] || o.note.fr}</div>` : ""}

    <div class="row-card" data-organism="${o.id}" style="margin-top:16px; border-color:var(--bleu);">
      <div class="row-icon" style="background:var(--bleu); color:white;">📋</div>
      <div class="row-text">
        <h4>${t("seeProcedures")}</h4>
      </div>
      <div class="row-chevron">›</div>
    </div>

    ${renderVoteBlock('partner-' + o.id)}
  `;
}

function renderInfo() {
  const today = new Date().getDay();
  return `
    <div class="info-block">
      <h4>${t("openingHours")}</h4>
      <table class="hours-table">
        ${siteInfo.hours.map(h => `
          <tr class="${h.day === today ? 'today' : ''}">
            <td>${t("days")[h.day]}</td>
            <td>
              ${h.hours}<br>
              <span style="font-size:11px; font-weight:700; color:${h.mode === 'libre' ? '#1B8A4B' : '#B5780E'};">
                ${h.mode === 'libre' ? '★ ' + t("modeFree") : t("modeRdv")}
              </span>
            </td>
          </tr>
        `).join("")}
      </table>
    </div>

    <div class="info-block">
      <h4>${t("addressTitle")}</h4>
      <p style="font-size:14px; margin-bottom:10px;">📍 ${siteInfo.address}</p>
      <h4 style="margin-top:14px;">${t("phoneTitle")}</h4>
      <p style="font-size:14px; margin-bottom:4px;">📞 ${siteInfo.phone}</p>
      <p style="font-size:12px; color:var(--texte-secondaire);">${t("phoneHoursTitle")} : ${siteInfo.phoneHours[state.lang] || siteInfo.phoneHours.fr}</p>
    </div>

    <div class="info-block">
      <h4>${t("languagesSpoken")}</h4>
      <div class="badge-row">
        ${siteInfo.languagesSpoken.map(l => `<span class="badge">${l}</span>`).join("")}
      </div>
    </div>

    <div class="info-block">
      <h4>${t("qpv")} / ${t("cyberboat")}</h4>
      <div class="badge-row">
        <span class="badge gold">${t("qpv")}</span>
        <span class="badge green">${t("cyberboat")}</span>
      </div>
    </div>

    <div class="note-box" style="background:#FCE9E9; border-color:#F2B8B8; color:#8A1F1F;">
      🔒 <strong>${t("securityTitle")}</strong><br>${t("securityNote")}
    </div>

    <div class="info-block">
      <h4>${t("permanencesTitle")}</h4>
      ${siteInfo.permanences.map(p => `
        <div style="padding:12px 0; border-bottom:1px solid #F0EDE3;">
          <div style="font-size:14px; font-weight:700; margin-bottom:4px;">${p.name[state.lang] || p.name.fr}</div>
          <div style="font-size:13px; color:var(--texte-secondaire); margin-bottom:${p.note ? '6px' : '0'};">${p.hours[state.lang] || p.hours.fr}</div>
          ${p.note ? `<div class="note-box" style="margin-top:6px; font-size:12px;">⚠️ ${p.note[state.lang] || p.note.fr}</div>` : ""}
        </div>
      `).join("")}
    </div>
  `;
}

function renderSituationList() {
  return `
    <div class="section-title">${t("maSituation")}</div>
    <p style="font-size:13px; color:var(--texte-secondaire); margin-bottom:16px;">${t("maSituationSub")}</p>
    ${situations.map(s => `
      <div class="row-card" data-situation="${s.id}">
        <div class="row-icon" style="font-size:22px; background:#F0EDE3;">${s.icon}</div>
        <div class="row-text">
          <h4>${s.title[state.lang] || s.title.fr}</h4>
        </div>
        <div class="row-chevron">›</div>
      </div>
    `).join("")}
  `;
}

function renderSituationDetail() {
  const s = situations.find(x => x.id === state.currentSituation);
  if (!s) return "";

  const orgsInApp = s.organisms.map(id => organisms.find(o => o.id === id)).filter(Boolean);

  return `
    <div class="detail-header">
      <div class="row-icon" style="width:50px;height:50px;font-size:24px;background:#F0EDE3;">${s.icon}</div>
      <div>
        <h2>${s.title[state.lang] || s.title.fr}</h2>
      </div>
    </div>

    <div class="info-block">
      <h4>${t("prioritySteps")}</h4>
      ${s.steps.map(step => `
        <div class="doc-item">• ${step[state.lang] || step.fr}</div>
      `).join("")}
    </div>

    <div class="section-title" style="margin-top:20px;">${t("organisms")}</div>
    ${orgsInApp.map(o => `
      <div class="row-card" data-organism="${o.id}" style="margin-bottom:8px;">
        <div class="row-icon">${o.icon}</div>
        <div class="row-text">
          <h4>${o.name[state.lang] || o.name.fr}</h4>
          <p style="font-size:11px; color:var(--bleu);">${t("seeDocumentsFor")}</p>
        </div>
        <div class="row-chevron">›</div>
      </div>
    `).join("")}
  `;
}

function renderCyberboat() {
  const today = new Date().getDay();
  const services = [
    { icon: "🌐", title: t("cyberboatService1Title"), desc: t("cyberboatService1Desc") },
    { icon: "🖨️", title: t("cyberboatService2Title"), desc: t("cyberboatService2Desc") },
    { icon: "🤝", title: t("cyberboatService3Title"), desc: t("cyberboatService3Desc") },
    { icon: "💼", title: t("cyberboatService4Title"), desc: t("cyberboatService4Desc") },
  ];
  return `
    <div class="detail-header">
      <div class="row-icon" style="width:50px;height:50px;font-size:22px;background:#FCE4E4;color:var(--rouge);">💻</div>
      <div>
        <h2>${t("cyberboatTitle")}</h2>
        <p>${t("cyberboatTagline")}</p>
      </div>
    </div>

    <div class="info-block" style="background:#FFFCF0; border-color:#F3E7B8;">
      <p style="font-size:14px; font-weight:700; margin-bottom:4px;">${t("cyberboatIntro")}</p>
      <p style="font-size:13px; color:var(--texte-secondaire); font-style:italic;">${t("cyberboatIntroSub")}</p>
    </div>

    <div class="info-block">
      <h4>${t("cyberboatHours")}</h4>
      <table class="hours-table">
        ${siteInfo.cyberboatHours.map(h => `
          <tr class="${h.day === today ? 'today' : ''}">
            <td>${t("days")[h.day]}</td>
            <td>${h.hours}</td>
          </tr>
        `).join("")}
      </table>
    </div>

    <div class="info-block">
      <h4>${t("cyberboatServicesTitle")}</h4>
      ${services.map(s => `
        <div style="display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid #F0EDE3;">
          <div style="font-size:18px; flex-shrink:0;">${s.icon}</div>
          <div>
            <div style="font-size:13.5px; font-weight:700; color:var(--bleu);">${s.title}</div>
            <div style="font-size:12.5px; color:var(--texte-secondaire);">${s.desc}</div>
          </div>
        </div>
      `).join("")}
    </div>

    <div class="info-block">
      <h4>${t("workshopsTitle")}</h4>
      <div class="note-box" style="margin-top:0;">💡 ${t("workshopsNote")}</div>
    </div>

    <p style="text-align:center; font-size:13.5px; font-weight:700; color:var(--bleu); margin-top:6px;">${t("cyberboatClosing")}</p>
  `;
}

/* ===================== EVENTS ===================== */

function attachLangEvents() {
  document.querySelectorAll(".lang-card").forEach(el => {
    el.addEventListener("click", () => {
      setScreen("home", { lang: el.dataset.lang });
    });
  });
}

function attachGlobalEvents() {
  const backBtn = document.getElementById("backBtn");
  if (backBtn) backBtn.addEventListener("click", () => {
    if (state.screen === "organism-detail") setScreen("organisms");
    else if (state.screen === "partners-detail") setScreen("partners");
    else if (state.screen === "situation-detail") setScreen("situation");
    else setScreen("home");
  });

  const langSwitch = document.getElementById("langSwitchBtn");
  if (langSwitch) langSwitch.addEventListener("click", () => setScreen("lang"));

  document.querySelectorAll("[data-nav]").forEach(el => {
    el.addEventListener("click", () => setScreen(el.dataset.nav));
  });

  document.querySelectorAll("[data-organism]").forEach(el => {
    el.addEventListener("click", () => setScreen("organism-detail", { currentOrganism: el.dataset.organism }));
  });

  document.querySelectorAll("[data-partner]").forEach(el => {
    el.addEventListener("click", () => setScreen("partners-detail", { currentPartner: el.dataset.partner }));
  });

  document.querySelectorAll("[data-situation]").forEach(el => {
    el.addEventListener("click", () => setScreen("situation-detail", { currentSituation: el.dataset.situation }));
  });
}

/* ===================== INIT ===================== */
render();
</script>
</body>
</html>
